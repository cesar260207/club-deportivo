<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>Registro</h1>

        <form>

            <div class="input-group">
                <label>Correo</label>
                <input type="email" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" required>
            </div>

            <div class="input-group">
                <label>Nombre</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Edad</label>
                <input type="number">
            </div>

            <div class="input-group">
                <label>¿Practica deporte?</label>
                <select>
                    <option>Sí</option>
                    <option>No</option>
                </select>
            </div>

            <div class="input-group">
                <label>Tipo de deporte</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Nivel</label>
                <select>
                    <option>Principiante</option>
                    <option>Intermedio</option>
                    <option>Avanzado</option>
                </select>
            </div>

            <button type="submit">Registrarse</button>

        </form>

        <div class="links">
            <a href="login.html">Volver al login</a>
        </div>

    </div>
</div>

</body>
</html>
